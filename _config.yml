# Jekyll 配置文件
title: 阿布 · AI 全栈工程师
description: Python 全栈 | 企业级 AI 落地 | RAG · Agent · 文档智能
url: https://briskygates.github.io
baseurl: ""
author: 阿布
lang: zh-CN

# Google Search Console 验证（在 Search Console 获取 meta 内容后填入，留空则不输出）
google_site_verification: ""

# 构建设置
markdown: kramdown
highlighter: rouge
plugins:
  - jekyll-feed
  - jekyll-sitemap

# 主题设置（使用空白主题，自定义样式）
theme: null

# 排除文件（避免无关页面进入 sitemap）
exclude:
  - Gemfile
  - Gemfile.lock
  - node_modules
  - vendor/bundle/
  - vendor/cache/
  - vendor/gems/
  - vendor/ruby/
  - DEPLOY.md
  - README.md
  - tests/
  - scripts/
  - package.json
  - package-lock.json
  - playwright.config.js
  - .github/

# 包含文件
include:
  - _pages

# 默认设置
defaults:
  - scope:
      path: ""
    values:
      layout: default
  - scope:
      path: "assets"
    values:
      sitemap: false
