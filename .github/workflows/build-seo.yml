name: Build SEO artifacts

on:
  push:
    branches: [main, master]
    paths:
      - 'assets/data/**'
      - 'scripts/**'
      - 'index.html'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - run: npm ci
      - run: npm run build

      - name: Commit generated SEO files
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add index.html llms-full.txt llms-full.en.txt _includes/json-ld.html
          if git diff --staged --quiet; then
            echo "No SEO artifact changes to commit."
          else
            git commit -m "chore: regenerate SEO artifacts [skip ci]"
            git push
          fi
