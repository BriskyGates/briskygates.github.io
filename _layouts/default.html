<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <title>{{ page.title | default: site.title }}</title>
    <meta name="description" content="{{ page.description | default: site.description }}">
    <link rel="alternate" type="text/plain" href="{{ '/llms.txt' | relative_url }}" title="LLM site summary">
    {% include json-ld.html %}
    <link rel="stylesheet" href="{{ '/assets/css/style.css' | relative_url }}">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" crossorigin="anonymous" referrerpolicy="no-referrer">
    <meta name="theme-color" content="#08090d">
</head>
<body class="site-body">
    {{ content }}
    <script>window.siteConfig = null;</script>
    <script defer src="{{ '/assets/vendor/vue.global.prod.js' | relative_url }}"></script>
    <script defer src="{{ '/assets/js/app-core.js' | relative_url }}"></script>
    <script defer src="{{ '/assets/js/main.js' | relative_url }}"></script>
</body>
</html>
